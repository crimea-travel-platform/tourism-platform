name: ${COMPOSE_PROJECT_NAME}

services:
  postgres:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - tourism-network
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - tourism-network
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    command:
      - server
      - /data
      - --console-address
      - :9001
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - http://localhost:9000/minio/health/live
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - tourism-network
    restart: unless-stopped

  minio-init:
    image: ${MINIO_MC_IMAGE}
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint:
      - /bin/sh
      - -c
    command:
      - >
        mc alias set local http://minio:9000
        "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${MINIO_BUCKET}" &&
        mc anonymous set none "local/$${MINIO_BUCKET}"
    networks:
      - tourism-network
    restart: "no"

  mailpit:
    image: ${MAILPIT_IMAGE}
    ports:
      - "${MAILPIT_SMTP_PORT}:1025"
      - "${MAILPIT_WEB_PORT}:8025"
    healthcheck:
      test:
        - CMD
        - /mailpit
        - readyz
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tourism-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  tourism-network:
    driver: bridge
