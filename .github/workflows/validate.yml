name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Documentation and Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install YAML linter
        run: python -m pip install --disable-pip-version-check yamllint==1.37.1

      - name: Validate required files, YAML, scripts, and Compose
        run: ./scripts/validate.sh
