name: Bug report
description: Сообщить о воспроизводимой ошибке
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Не публикуйте секреты, токены или персональные данные.
  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Что произошло и какого поведения вы ожидали?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Выполнить...
        2. Открыть...
        3. Увидеть...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Окружение
      description: OS, версия Docker, ветка или commit.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Дополнительный контекст
      description: Добавьте очищенные от секретов логи или screenshots.
